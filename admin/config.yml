backend:
  name: git-gateway
  branch: main

media_folder: "Images/uploads"
public_folder: "/Images/uploads"

collections:
  - name: "courses"
    label: "Courses"
    files:
      - label: "Android Course"
        name: "android"
        file: "data/android.json"
        fields:
          - label: "Videos"
            name: "videos"
            widget: "list"
            fields:
              - { label: "Video Name", name: "title", widget: "string" }
              - { label: "Video Link", name: "link", widget: "string" }

      - label: "Design Course"
        name: "design"
        file: "data/design.json"
        fields:
          - label: "Videos"
            name: "videos"
