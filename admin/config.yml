backend:
  name: git-gateway
  branch: main

media_folder: "Images/uploads"
public_folder: "/Images/uploads"

collections:
  - name: "courses"
    label: "Courses"
    files:
      - label: "Android Course"
        name: "android"
        file: "data/android.json"
        fields:
          - label: "Videos"
            name: "videos"
            widget: "list"
            fields:
              - { label: "Video Name", name: "title", widget: "string" }
              - { label: "Video Link", name: "link", widget: "string" }

      - label: "Design Course"
        name: "design"
        file: "data/design.json"
        fields:
          - label: "Videos"
            name: "videos"
            widget: "list"
            fields:
              - { label: "Video Name", name: "title", widget: "string" }
              - { label: "Video Link", name: "link", widget: "string" }

      - label: "How Course"
        name: "how"
        file: "data/how.json"
        fields:
          - label: "Videos"
            name: "videos"
            widget: "list"
            fields:
              - { label: "Video Name", name: "title", widget: "string" }
              - { label: "Video Link", name: "link", widget: "string" }

      - label: "Pattern Course"
        name: "pattern"
        file: "data/pattern.json"
        fields:
          - label: "Videos"
            name: "videos"
            widget: "list"
            fields:
              - { label: "Video Name", name: "title", widget: "string" }
              - { label: "Video Link", name: "link", widget: "string" }

      - label: "Web Course"
        name: "web"
        file: "data/web.json"
        fields:
          - label: "Videos"
            name: "videos"
            widget: "list"
            fields:
              - { label: "Video Name", name: "title", widget: "string" }
              - { label: "Video Link", name: "link", widget: "string" }

      - label: "WordPress Course"
        name: "wordpress"
        file: "data/wordpress.json"
        fields:
          - label: "Chapters"
            name: "chapters"
            widget: "list"
            fields:
              - { label: "Chapter Title", name: "title", widget: "string" }
              - label: "Chapter Type"
                name: "type"
                widget: "select"
                options: ["pdf", "images", "video", "file"]
              - { label: "PDF/File Path", name: "file", widget: "string", required: false }
              - { label: "Video Link", name: "video", widget: "string", required: false }
              - { label: "Download Path", name: "download", widget: "string", required: false }
              - label: "Images"
                name: "images"
                widget: "list"
                required: false
                fields:
                  - { label: "Image", name: "src", widget: "image" }
                  - { label: "Image Title", name: "title", widget: "string", required: false }
                  - { label: "Image Description", name: "desc", widget: "text", required: false }
  - name: "team"
    label: "Team"
    files:
      - label: "Team Members"
        name: "members"
        file: "data/team.json"
        fields:
          - label: "Members"
            name: "members"
            widget: "list"
            fields:
              - { label: "الاسم", name: "name", widget: "string" }
              - { label: "المنصب", name: "role", widget: "string" }
              - { label: "التخصص", name: "department", widget: "string" }
              - { label: "الصورة", name: "image", widget: "image" }
              - { label: "Instagram", name: "instagram", widget: "string", required: false }
              - { label: "LinkedIn", name: "linkedin", widget: "string", required: false }
              - { label: "GitHub", name: "github", widget: "string", required: false }