backend:
  name: git-gateway
  branch: main

media_folder: "Images/uploads"
public_folder: "/Images/uploads"

collections:
  - name: "courses"
    label: "Courses"
    files:
      - label: "Android Course"
        name: "android"
        file: "data/android.json"
        fields:
          - label: "Videos"
            name: "videos"
            widget: "list"
            fields:
              - { label: "عنوان الفيديو", name: "title", widget: "string" }
              - { label: "رابط الفيديو", name: "link", widget: "string" }
              - { label: "وصف الفيديو", name: "description", widget: "text", required: false }
              - { label: "صورة الفيديو", name: "cover", widget: "image", required: false }

      - label: "Design Course"
        name: "design"
        file: "data/design.json"
        fields:
          - label: "Videos"
            name: "videos"
            widget: "list"
            fields:
              - { label: "عنوان الفيديو", name: "title", widget: "string" }
              - { label: "رابط الفيديو", name: "link", widget: "string" }
              - { label: "وصف الفيديو", name: "description", widget: "text", required: false }
              - { label: "صورة الفيديو", name: "cover", widget: "image", required: false }

      - label: "How Course"
        name: "how"
        file: "data/how.json"
        fields:
          - label: "Videos"
            name: "videos"
            widget: "list"
            fields:
              - { label: "عنوان الفيديو", name: "title", widget: "string" }
              - { label: "رابط الفيديو", name: "link", widget: "string" }
              - { label: "وصف الفيديو", name: "description", widget: "text", required: false }
              - { label: "صورة الفيديو", name: "cover", widget: "image", required: false }

      - label: "Pattern Course"
        name: "pattern"
        file: "data/pattern.json"
        fields:
          - label: "Videos"
            name: "videos"
            widget: "list"
            fields:
              - { label: "عنوان الفيديو", name: "title", widget: "string" }
              - { label: "رابط الفيديو", name: "link", widget: "string" }
              - { label: "وصف الفيديو", name: "description", widget: "text", required: false }
              - { label: "صورة الفيديو", name: "cover", widget: "image", required: false }

      - label: "Web Course"
        name: "web"
        file: "data/web.json"
        fields:
          - label: "Videos"
            name: "videos"
            widget: "list"
            fields:
              - { label: "عنوان الفيديو", name: "title", widget: "string" }
              - { label: "رابط الفيديو", name: "link", widget: "string" }
              - { label: "وصف الفيديو", name: "description", widget: "text", required: false }
              - { label: "صورة الفيديو", name: "cover", widget: "image", required: false }

      - label: "WordPress Course"
        name: "wordpress"
        file: "data/wordpress.json"
        fields:
          - label: "Videos"
            name: "videos"
            widget: "list"
            fields:
              - { label: "عنوان الفيديو", name: "title", widget: "string" }
              - { label: "رابط الفيديو", name: "link", widget: "string" }
              - { label: "وصف الفيديو", name: "description", widget: "text", required: false }
              - { label: "صورة الفيديو", name: "cover", widget: "image", required: false }
  - name: "team"
    label: "Team"
    files:
      - label: "Team Members"
        name: "members"
        file: "data/team.json"
        fields:
          - label: "Members"
            name: "members"
            widget: "list"
            fields:
            - { label: "الاسم", name: "name", widget: "string" }
            - { label: "المنصب", name: "role", widget: "string" }
            - { label: "التخصص", name: "department", widget: "string" }
            - { label: "الصورة", name: "image", widget: "image" }
            - { label: "Instagram", name: "instagram", widget: "string", required: false } 
            - { label: "LinkedIn", name: "linkedin", widget: "string", required: false }
            - { label: "GitHub", name: "github", widget: "string", required: false }
            