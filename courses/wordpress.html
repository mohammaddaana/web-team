<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kraken - WordPress Course</title>

  <link rel="icon" type="image/png" href="../Images/Personal/k.png" />
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="../wordpress-course.css" />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
</head>
<body class="courses-page">

  <header class="main">
    <nav>
      <ul>
        <li><a href="../Index.html">Home</a></li>
        <li><a href="../Courses.html">Courses</a></li>
      </ul>
    </nav>
  </header>

  <header class="sub-page-header">
    <h1>Kraken Courses</h1>
    <p>WordPress development with <u>Ahmad khattab</u></p>
  </header>

  <button class="mobile-menu-btn" onclick="togglePlaylist(event)">
    <i class="fas fa-bars"></i>
  </button>

  <div class="chapter-section">
    <aside class="chapter-playlist" id="playlist-container">
      <h3>Course Playlist</h3>

      <div class="playlist-items" id="playlistItems">
        <!-- chapters from wordpress.json -->
      </div>

      <span class="close-menu" onclick="togglePlaylist(event)">&times;</span>
    </aside>

    <section class="chapter-display">
      <div class="chapter-viewer-wrapper">
        <button
          class="fullscreen-btn"
          id="fullscreenBtn"
          onclick="openFullscreen()"
          title="Fullscreen"
        >
          <i class="fas fa-expand"></i>
        </button>

        <div class="chapter-viewer" id="chapterViewer">
          <div class="empty-message">
            Loading chapter...
          </div>
        </div>
      </div>

      <div class="chapter-actions-bottom">
        <a
          id="downloadBtn"
          class="download-btn"
          href="#"
          style="display: none;"
          download
        >
          <i class="fas fa-download"></i>
          Download Chapter
        </a>
      </div>
    </section>
  </div>

  <script src="../wordpress-course.js"></script>
</body>
</html>
